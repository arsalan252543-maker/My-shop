<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glow Cosmetic Store</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f7f7f7;
      color:#222;
    }

    header{
      background:black;
      color:white;
      padding:18px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }

    .hero{
      height:90vh;
      background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1200') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
    }

    .hero-content{
      background:rgba(0,0,0,0.5);
      padding:30px;
      border-radius:15px;
    }

    .hero h1{
      font-size:45px;
      margin-bottom:15px;
    }

    .hero p{
      font-size:18px;
      margin-bottom:20px;
    }

    .btn{
      background:#ff4d8d;
      color:white;
      padding:12px 25px;
      border:none;
      border-radius:30px;
      text-decoration:none;
      font-size:18px;
    }

    .products{
      padding:50px 20px;
      text-align:center;
    }

    .products h2{
      font-size:35px;
      margin-bottom:30px;
    }

    .product-box{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card h3{
      margin:15px 0 10px;
    }

    .card p{
      padding:0 15px 20px;
      color:#555;
    }

    footer{
      background:black;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  Glow Cosmetic Store
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Beauty Starts Here</h1>
    <p>Best Makeup & Cosmetic Collection</p>
    <a href="#" class="btn">Shop Now</a>
  </div>
</section>

<section class="products">
  <h2>Our Products</h2>

  <div class="product-box">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?q=80&w=800">
      <h3>Lipstick</h3>
      <p>Premium long lasting lipstick collection.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526045478516-99145907023c?q=80&w=800">
      <h3>Face Cream</h3>
      <p>Glow skin cream for daily care.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1625093742435-6fa192b6fb10?q=80&w=800">
      <h3>Perfume</h3>
      <p>Luxury fragrance for men & women.</p>
    </div>

  </div>
</section>

<footer>
  © 2026 Glow Cosmetic Store
</footer>

</body>
  </html>
