<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #2563eb);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: white;
      color: #2563eb;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 40px auto;
      max-width: 500px;
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome / स्वागत है</h1>
    <p>This is your demo website.<br>Yeh aapki demo website hai.</p>

    <a href="#" class="btn">Get Started / शुरू करें</a>

    <div class="card">
      <h2>About Website / वेबसाइट के बारे में</h2>
      <p>
        This website is made for demo purposes.<br>
        Yeh website demo purpose ke liye banayi gayi hai
